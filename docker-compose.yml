services:
  backend:
    build: ./backend
    expose:
      - "3001"
    volumes:
      - sqlite_data:/data
    environment:
      - DB_PATH=/data/monotributo.db
      - PORT=3001
    networks:
      - internal
    restart: unless-stopped

  frontend:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - frontend_modules:/app/node_modules
    ports:
      - "8089:3000"
    environment:
      - HOST=0.0.0.0
      - WDS_SOCKET_PORT=0
    command: sh -c "npm install && npm start"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  sqlite_data:
  frontend_modules:
